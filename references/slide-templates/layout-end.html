<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- ═══════════════════════════════════════════════════════════════
 版型（結尾）：收尾頁（end）
 用途：影片最後一張。一句「第一人稱心得」（teaching-style §5）+ 視覺主角 +
      （若主講者是 AI）AI 身份揭露一行（teaching-style §7，強制）。
 替換：
   1. .hero 視覺主角（跟開場呼應，換成主題相關的 SVG/emoji 場景）
   2. .closing 一句個人心得（不要 meta 評論、不要「記得按讚訂閱」式誘餌）
   3. .disclosure AI 身份揭露（若非 AI 製作可刪）
 禁忌：結尾不要塞總結條列；一句話 + 一個畫面就夠
═══════════════════════════════════════════════════════════════ -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #ffffff;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', 'WenQuanYi Zen Hei', sans-serif;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 80px 80px 130px;
    overflow: hidden; position: relative;
  }
  .hero { font-size: 150px; margin-bottom: 40px; }
  .closing {
    font-size: 60px; font-weight: 800; text-align: center; line-height: 1.4; max-width: 1500px;
  }
  .closing .kw { color: #e94560; }
  .disclosure { font-size: 34px; color: #b8c4e0; margin-top: 48px; text-align: center; }
  .channel { position: absolute; bottom: 30px; left: 50px; font-size: 24px; opacity: 0.5; }
  .slide-number { position: absolute; bottom: 30px; right: 50px; font-size: 24px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="hero">🤖🎧</div>
  <div class="closing">下次對手機說話時，<br>想像背後有個<span class="kw">拚命聽寫的小助手</span>。</div>
  <div class="disclosure">本影片由人工智慧製作與配音</div>
  <div class="channel">🎬 Your Channel Name</div>
  <div class="slide-number">10/10</div>
</body>
</html>
