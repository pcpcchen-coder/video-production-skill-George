<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- ═══════════════════════════════════════════════════════════════
 版型 1／8：開場頁（title）
 用途：影片第 1 張。大標題 + 一句副標 + 一個視覺主角。
 替換：
   1. .title 的標題文字（≤ 15 字，問句最抓人）
   2. .subtitle 的副標（一句話說「這支影片是什麼類型、為什麼該看」）
   3. .hero 裡的視覺主角 — 換成跟主題有關的 inline SVG 或大 emoji 組合，
      不要留一排無意義的裝飾 emoji
 禁忌：開場頁不要塞條列點；視覺主角只能有一個焦點
═══════════════════════════════════════════════════════════════ -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #ffffff;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', 'WenQuanYi Zen Hei', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 80px 120px;  /* 底部多留：燒錄字幕的安全區 */
    overflow: hidden; position: relative;
  }
  .hero { margin-bottom: 48px; }
  .title {
    font-size: 104px; font-weight: 900; text-align: center;
    line-height: 1.25; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  .title .accent { color: #e94560; }
  .rule { width: 320px; height: 8px; background: #e94560; border-radius: 4px; margin: 36px 0; }
  .subtitle { font-size: 44px; color: #b8c4e0; text-align: center; }
  .channel { position: absolute; bottom: 30px; left: 50px; font-size: 24px; opacity: 0.5; }
  .slide-number { position: absolute; bottom: 30px; right: 50px; font-size: 24px; opacity: 0.5; }
</style>
</head>
<body>
  <!-- ★ 視覺主角：換成主題相關的 SVG／emoji 場景（下面是「手機聽懂人話」的範例） -->
  <div class="hero">
    <svg width="560" height="260" viewBox="0 0 560 260" fill="none">
      <!-- 講話的人 -->
      <circle cx="80" cy="90" r="34" stroke="#ffffff" stroke-width="6"/>
      <line x1="80" y1="124" x2="80" y2="200" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <line x1="80" y1="150" x2="40" y2="185" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <line x1="80" y1="150" x2="120" y2="185" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <!-- 聲波 -->
      <path d="M140 95 q14 -14 0 -28" stroke="#e94560" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M165 105 q24 -24 0 -48" stroke="#e94560" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M190 115 q34 -34 0 -68" stroke="#e94560" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- 手機 -->
      <rect x="250" y="30" width="120" height="200" rx="18" stroke="#ffffff" stroke-width="6"/>
      <line x1="290" y1="205" x2="330" y2="205" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <!-- 箭頭 -->
      <line x1="395" y1="128" x2="455" y2="128" stroke="#b8c4e0" stroke-width="6" stroke-linecap="round"/>
      <path d="M455 128 l-18 -12 v24 z" fill="#b8c4e0"/>
      <!-- 變成文字 -->
      <text x="475" y="148" font-size="56" fill="#ffffff" font-weight="bold">字</text>
    </svg>
  </div>
  <div class="title">手機怎麼<span class="accent">聽懂</span>你說話？</div>
  <div class="rule"></div>
  <div class="subtitle">三張圖，帶你認識語音辨識</div>
  <div class="channel">🎬 Your Channel Name</div>
  <div class="slide-number">1/10</div>
</body>
</html>
