<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- ═══════════════════════════════════════════════════════════════
 版型 7／8：真實截圖（screenshot）
 用途：teaching-style §3 的硬規則 —「我看了 X／我做了 X／我跑了 X」型影片，
      一定要嵌入該 X 的『真實截圖』，不能用文字或自己畫的示意圖代替。
      這是 Path B（HTML）最大的優勢：Path A 生圖做不到真截圖。
 做法：
   1. 把抓到的畫面存到專案的 screenshots/ 資料夾
   2. 下面 <img> 的 src 用相對路徑指到它（Playwright 用 file:// 載入，相對路徑可行）
   3. 想圈重點：在 .frame 裡疊一個 .marker 方框（absolute 定位）指出要看哪裡
 替換：
   1. .title 標題
   2. <img src> 換成你的真截圖
   3. .gloss 說明框：一句話講「觀眾該注意畫面裡的什麼」
 禁忌：找不到真畫面就不要用這版型硬掰一張假的；改用流程圖或比喻場景
═══════════════════════════════════════════════════════════════ -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #ffffff;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', 'WenQuanYi Zen Hei', sans-serif;
    display: flex; align-items: center; gap: 56px;
    padding: 80px 80px 120px;
    overflow: hidden; position: relative;
  }
  .text-col { width: 38%; }
  .title { font-size: 60px; font-weight: 900; line-height: 1.3; }
  .rule { width: 160px; height: 8px; background: #e94560; border-radius: 4px; margin: 26px 0 40px; }
  .gloss {
    background: rgba(233,69,96,0.14); border-left: 10px solid #e94560;
    border-radius: 0 16px 16px 0; padding: 28px 30px;
    font-size: 38px; line-height: 1.5; color: #ffffff;
  }
  .gloss .kw { color: #e94560; font-weight: 700; }
  .frame {
    width: 62%; position: relative;
    border: 6px solid rgba(255,255,255,0.35); border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: #0d1b2a;
  }
  .frame img { width: 100%; display: block; }
  /* 找不到真截圖時的占位（正式影片請換成真畫面） */
  .placeholder {
    width: 100%; aspect-ratio: 16/10; display: flex; flex-direction: column;
    justify-content: center; align-items: center; color: #6a8caf; gap: 16px;
    background: repeating-linear-gradient(45deg, #12233b, #12233b 24px, #16294a 24px, #16294a 48px);
  }
  .placeholder .big { font-size: 90px; }
  .placeholder .cap { font-size: 34px; }
  .marker {
    position: absolute; border: 6px solid #e94560; border-radius: 10px;
    box-shadow: 0 0 0 4px rgba(0,0,0,0.4);
  }
  .channel { position: absolute; bottom: 30px; left: 50px; font-size: 24px; opacity: 0.5; }
  .slide-number { position: absolute; bottom: 30px; right: 50px; font-size: 24px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="text-col">
    <div class="title">我實際打開<br>語音輸入來試</div>
    <div class="rule"></div>
    <div class="gloss">看畫面右下角，<span class="kw">邊講字邊跳出來</span>——這就是即時聽寫。</div>
  </div>
  <div class="frame">
    <!-- ★ 正式使用時換成：<img src="../screenshots/voice-input.png" alt="語音輸入畫面"> -->
    <div class="placeholder">
      <div class="big">🖼️</div>
      <div class="cap">把真實截圖放這裡（screenshots/…png）</div>
    </div>
    <!-- 圈重點範例（座標依你的截圖調整）：
    <div class="marker" style="right:6%; bottom:10%; width:34%; height:22%;"></div> -->
  </div>
  <div class="channel">🎬 Your Channel Name</div>
  <div class="slide-number">7/10</div>
</body>
</html>
