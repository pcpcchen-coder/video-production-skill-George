<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- ═══════════════════════════════════════════════════════════════
 版型 5／8：流程圖（flow）
 用途：講「步驟」「順序」「一件事怎麼變成另一件事」。teaching-style §2 說
      「流程圖比文字定義好」— 任何有先後關係的內容都優先用這張。
 替換：
   1. .title 標題
   2. 每個 .step：一個 emoji/序號 + 一個短標籤（≤ 8 字）+ 一句小字說明
   3. 步驟數 2–5 個最好讀；超過 5 個拆兩張
   4. 想強調某一步 = 給它加 class="step hot"
 禁忌：每個 step 的說明不要寫成整句旁白；那是旁白的工作
═══════════════════════════════════════════════════════════════ -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #ffffff;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', 'WenQuanYi Zen Hei', sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 70px 80px 120px;
    overflow: hidden; position: relative;
  }
  .title { font-size: 64px; font-weight: 900; margin-bottom: 70px; }
  .title::after { content: ''; display: block; width: 200px; height: 8px; background: #e94560; border-radius: 4px; margin-top: 20px; }
  .flow { display: flex; align-items: stretch; justify-content: center; gap: 0; }
  .step {
    flex: 1; max-width: 380px; background: rgba(255,255,255,0.05); border-radius: 24px;
    padding: 40px 28px; text-align: center; border: 3px solid rgba(255,255,255,0.15);
  }
  .step.hot { border-color: #e94560; background: rgba(233,69,96,0.12); }
  .step .icon { font-size: 84px; line-height: 1; }
  .step .label { font-size: 42px; font-weight: 800; margin: 20px 0 12px; }
  .step .desc { font-size: 32px; color: #b8c4e0; line-height: 1.4; }
  .arrow { display: flex; align-items: center; padding: 0 8px; }
  .arrow svg { width: 70px; height: 40px; }
  .channel { position: absolute; bottom: 30px; left: 50px; font-size: 24px; opacity: 0.5; }
  .slide-number { position: absolute; bottom: 30px; right: 50px; font-size: 24px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="title">聲音變文字的三步驟</div>
  <div class="flow">
    <div class="step">
      <div class="icon">🎤</div>
      <div class="label">收聲音</div>
      <div class="desc">錄下你說的話</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 70 40"><line x1="4" y1="20" x2="56" y2="20" stroke="#b8c4e0" stroke-width="6" stroke-linecap="round"/><path d="M56 20 l-18 -11 v22 z" fill="#b8c4e0"/></svg></div>
    <div class="step hot">
      <div class="icon">✂️</div>
      <div class="label">切段猜字</div>
      <div class="desc">一小段一小段猜</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 70 40"><line x1="4" y1="20" x2="56" y2="20" stroke="#b8c4e0" stroke-width="6" stroke-linecap="round"/><path d="M56 20 l-18 -11 v22 z" fill="#b8c4e0"/></svg></div>
    <div class="step">
      <div class="icon">📝</div>
      <div class="label">串成句子</div>
      <div class="desc">挑最通順的答案</div>
    </div>
  </div>
  <div class="channel">🎬 Your Channel Name</div>
  <div class="slide-number">2/10</div>
</body>
</html>
