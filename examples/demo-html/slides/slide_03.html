<!DOCTYPE html>
<!-- Path B demo slide 3 — from references/slide-templates/layout-end.html -->
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', 'WenQuanYi Zen Hei', sans-serif;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 80px 80px 130px; overflow: hidden; position: relative;
  }
  .hero { font-size: 150px; margin-bottom: 40px; }
  .closing { font-size: 60px; font-weight: 800; text-align: center; line-height: 1.4; max-width: 1500px; }
  .closing .kw { color: #e94560; }
  .disclosure { font-size: 34px; color: #b8c4e0; margin-top: 48px; text-align: center; }
  .channel { position: absolute; bottom: 30px; left: 50px; font-size: 24px; opacity: 0.5; }
  .slide-number { position: absolute; bottom: 30px; right: 50px; font-size: 24px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="hero">🤖🎧</div>
  <div class="closing">下次對手機說話時，<br>想像背後有個<span class="kw">拚命聽寫的小助手</span>。</div>
  <div class="disclosure">本影片由人工智慧製作與配音</div>
  <div class="channel">🎬 蝦說 AI</div>
  <div class="slide-number">3/3</div>
</body>
</html>
